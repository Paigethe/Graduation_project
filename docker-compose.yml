name: bs001-psycare

services:
  mysql:
    image: mysql:8.0
    container_name: bs001_psycare_mysql
    restart: unless-stopped
    ports:
      - "52518:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bs001_root_pw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bs001_psycare}
      MYSQL_USER: ${MYSQL_USER:-bs001_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bs001_pass}
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-time-zone=+08:00"
    volumes:
      - bs001_psycare_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: bs001_psycare_redis
    restart: unless-stopped
    ports:
      - "52519:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - bs001_psycare_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  bs001_psycare_mysql_data:
  bs001_psycare_redis_data:

